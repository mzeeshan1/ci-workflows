name: Semantic Release

on:
  workflow_call:
    inputs:
      tag_format:
        description: "Tag format (e.g. 'v' or '' for default)"
        required: false
        type: string
        default: ""
      monorepo_dirs:
        description: "Comma-separated list of monorepo directories (e.g. 'aws' or '' for single repo)"
        required: false
        type: string
        default: ""
    secrets:
      GITHUB_TOKEN:
        required: true

  # Also allow direct push triggers for standalone use
  push:
    branches:
      - main
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip release commits (prevents infinite loop)
    if: |
      !startsWith(github.event.head_commit.message, 'chore(release)') &&
      !startsWith(github.event.head_commit.message, 'docs(changelog)')

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SEMANTIC_RELEASE_TAG_FORMAT: ${{ inputs.tag_format || '' }}
      SEMANTIC_RELEASE_MONOREPO_DIRS: ${{ inputs.monorepo_dirs || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: |
          npm install --silent semantic-release@24.1.0 \
            @semantic-release/changelog@6.0.3 \
            @semantic-release/git@10.0.1 \
            @semantic-release/github@11.0.1 \
            semantic-release-monorepo@8.0.2

      # -----------------------------------
      # SINGLE REPO MODE
      # -----------------------------------
      - name: Publish single release
        if: env.SEMANTIC_RELEASE_MONOREPO_DIRS == ''
        run: |
          echo "$GITHUB_TOKEN"
          echo "Running single module release..."

          # Build .releaserc.yaml using printf to avoid heredoc YAML conflicts
          {
            printf 'branches:\n'
            printf '  - main\n'
            printf '  - master\n'
            if [ -n "$SEMANTIC_RELEASE_TAG_FORMAT" ]; then
              printf 'tagFormat: "%s${version}"\n' "$SEMANTIC_RELEASE_TAG_FORMAT"
            fi
            printf 'plugins:\n'
            printf '  - "@semantic-release/commit-analyzer"\n'
            printf '  - "@semantic-release/release-notes-generator"\n'
            printf '  - ["@semantic-release/changelog", { "changelogFile": "CHANGELOG.md" }]\n'
            printf '  - "@semantic-release/github"\n'
            printf '  - ["@semantic-release/git", { "assets": ["CHANGELOG.md"], "message": "docs(changelog): update for ${nextRelease.version}" }]\n'
          } > .releaserc.yaml

          echo "{\"name\":\"${GITHUB_REPOSITORY}\"}" > package.json
          npx semantic-release

      # -----------------------------------
      # MONOREPO MODE
      # -----------------------------------
      - name: Publish multiple releases
        if: env.SEMANTIC_RELEASE_MONOREPO_DIRS != ''
        run: |
          set -euo pipefail

          echo "Running monorepo release..."

          IFS=',' read -r -a monorepo_dirs <<< "${SEMANTIC_RELEASE_MONOREPO_DIRS}"

          for monorepo_dir in "${monorepo_dirs[@]}"; do
            if [ ! -d "${monorepo_dir}" ]; then
              echo "Directory ${monorepo_dir} does not exist"
              exit 1
            fi

            find "${monorepo_dir}" -mindepth 1 -maxdepth 1 -type d | while read -r module_path; do

              package_name=$(echo "${module_path}" | sed 's/\//-/g')

              echo "==========================================="
              echo "Releasing ${package_name}"
              echo "==========================================="

              pushd "${module_path}" > /dev/null

              # Build .releaserc.yaml using printf to avoid heredoc YAML conflicts
              {
                printf 'branches:\n'
                printf '  - main\n'
                printf '  - master\n'
                printf 'tagFormat: "%s-v${version}"\n' "${package_name}"
                printf 'plugins:\n'
                printf '  - "@semantic-release/commit-analyzer"\n'
                printf '  - "@semantic-release/release-notes-generator"\n'
                printf '  - ["@semantic-release/changelog", { "changelogFile": "CHANGELOG.md" }]\n'
                printf '  - "@semantic-release/github"\n'
                printf '  - ["@semantic-release/git", { "assets": ["CHANGELOG.md"], "message": "docs(changelog): update for ${nextRelease.version}" }]\n'
              } > .releaserc.yaml

              echo "{\"name\": \"${package_name}\"}" > package.json

              npx semantic-release --extends semantic-release-monorepo

              popd > /dev/null
            done
          done
