name: Semantic Release

on:
  workflow_call:
    inputs:
      tag_format:
        description: "Tag format (e.g. 'v' or '' for default)"
        required: false
        type: string
        default: ""
      monorepo_dirs:
        description: "Comma-separated list of monorepo directories (e.g. 'aws' or '' for single repo)"
        required: false
        type: string
        default: ""

  # Also allow direct push triggers for standalone use
  push:
    branches:
      - main
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip release commits (prevents infinite loop)
    if: |
      !startsWith(github.event.head_commit.message, 'chore(release)') &&
      !startsWith(github.event.head_commit.message, 'docs(changelog)')

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SEMANTIC_RELEASE_TAG_FORMAT: ${{ inputs.tag_format || '' }}
      SEMANTIC_RELEASE_MONOREPO_DIRS: ${{ inputs.monorepo_dirs || '' }}
      SEMANTIC_RELEASE_CONFIG_BASE: |
        branches:
          - main
          - master
        plugins:
          - "@semantic-release/commit-analyzer"
          - "@semantic-release/release-notes-generator"
          - - "@semantic-release/changelog"
            - changelogFile: CHANGELOG.md
          - "@semantic-release/github"
          - - "@semantic-release/git"
            - assets:
                - CHANGELOG.md
              message: "docs(changelog): update for ${nextRelease.version}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: |
          npm install --silent \
            semantic-release@21.1.2 \
            @semantic-release/changelog@6.0.3 \
            @semantic-release/git@10.0.1 \
            @semantic-release/github@11.0.1 \
            semantic-release-monorepo@8.0.2

      - name: Install dependencies
        run: |
          npm install --silent semantic-release@24.1.0 \
            @semantic-release/changelog@6.0.3 \
            @semantic-release/git@10.0.1 \
            @semantic-release/github@11.0.1 \
            semantic-release-monorepo@8.0.2

      # -----------------------------------
      # SINGLE REPO MODE
      # -----------------------------------
      - name: Publish single release
        if: env.SEMANTIC_RELEASE_MONOREPO_DIRS == ''
        run: |
          echo "Running single module release..."
          if [ -n "${SEMANTIC_RELEASE_TAG_FORMAT}" ]; then
            echo -e "tagFormat: ${SEMANTIC_RELEASE_TAG_FORMAT}\n${SEMANTIC_RELEASE_CONFIG_BASE}" > .releaserc.yaml
          else
            echo "${SEMANTIC_RELEASE_CONFIG_BASE}" > .releaserc.yaml
          fi
          echo "${SEMANTIC_RELEASE_CONFIG_GIT}" | sed 's/^/  /' >> .releaserc.yaml
          cat .releaserc.yaml
          echo "{\"name\":\"${GITHUB_REPOSITORY}\"}" > package.json
          *semantic_release_dependencies
          npx semantic-release

      # -----------------------------------
      # MONOREPO MODE
      # -----------------------------------
      - name: Publish multiple releases
        if: env.SEMANTIC_RELEASE_MONOREPO_DIRS != ''
        run: |
          set -euo pipefail

          echo "Running monorepo release..."

          IFS=',' read -r -a monorepo_dirs <<< "${SEMANTIC_RELEASE_MONOREPO_DIRS}"

          # Iterate through each monorepo parent directory
          for monorepo_dir in "${monorepo_dirs[@]}"; do

            # Check if the monorepo parent directory exists
            if [ -d "${monorepo_dir}" ]; then

              # Find each subdirectory within the parent directory
              package_paths="$(find ${monorepo_dir} -type d -mindepth 1 -maxdepth 1)"

              # Iterate through each package
              for package_path in ${package_paths}; do

                # Get package name by replacing "/" with "-" in package path
                package_name=$(echo ${package_path} | sed 's/\//-/g')
                cd ${package_path}
                # Create `.releaserc.yaml` with semantic-release configuration
                echo "${SEMANTIC_RELEASE_CONFIG_BASE}" > .releaserc.yaml
                echo "${SEMANTIC_RELEASE_CONFIG_GIT}" | sed 's/^/  /' >> .releaserc.yaml
                cat .releaserc.yaml
                # It is required to have `package.json` with the package name for changelog generation
                echo "{\"name\": \"$package_name\"}" > package.json
                echo "********************************************************************************"
                echo "Launching semantic-release for $package_name package..."
                echo "********************************************************************************"
                npx semantic-release --extends semantic-release-monorepo
                cd -
              done
            else
              echo "Monorepo directory $monorepo_dir does not exist"
              exit 1
            fi
          done
